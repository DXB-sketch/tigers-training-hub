<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tigers — Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a18;
  font-family: Arial, Helvetica, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-wrap {
  width: 100%;
  max-width: 380px;
}

/* Club mark */
.club-mark {
  text-align: center;
  margin-bottom: 36px;
}
.club-mark-bar {
  width: 40px;
  height: 4px;
  background: #c88000;
  margin: 0 auto 16px;
}
.club-name-lg {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #fdfcf9;
  margin-bottom: 3px;
}
.club-sub {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #c88000;
}

/* Form card */
.form-card {
  background: #fdfcf9;
  padding: 32px 28px 28px;
}

.form-title {
  font-size: 18px;
  font-weight: 700;
  color: #1a1a18;
  margin-bottom: 4px;
}
.form-sub {
  font-size: 12px;
  color: #777;
  margin-bottom: 28px;
}

.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 6px;
}
.field input {
  display: block;
  width: 100%;
  padding: 11px 12px;
  font-size: 14px;
  font-family: Arial, sans-serif;
  color: #1a1a18;
  background: #fdfcf9;
  border: 1.5px solid #d8d4cc;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus {
  border-color: #c88000;
}
.field input::placeholder { color: #bbb; }

.sign-in-btn {
  display: block;
  width: 100%;
  padding: 13px;
  background: #1a1a18;
  color: #c88000;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  margin-top: 24px;
  transition: background 0.15s;
}
.sign-in-btn:hover { background: #2e2e2a; }

.form-note {
  font-size: 11px;
  color: #aaa;
  text-align: center;
  margin-top: 16px;
  line-height: 1.5;
}

/* Role indicator */
.role-strip {
  margin-top: 24px;
  border-top: 1px solid #2e2e2a;
  padding-top: 20px;
  display: flex;
  gap: 12px;
}
.role-pill {
  flex: 1;
  padding: 10px;
  border: 1px solid #2e2e2a;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
}
.role-pill:hover { border-color: #c88000; }
.role-pill-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 3px;
}
.role-pill-name {
  font-size: 12px;
  font-weight: 700;
  color: #aaa;
}
</style>
</head>
<body>

<div class="login-wrap">

  <div class="club-mark">
    <div class="club-mark-bar"></div>
    <div class="club-name-lg">Bribie Island Tigers FC</div>
    <div class="club-sub">Training Hub</div>
  </div>

  <div class="form-card">
    <div class="form-title">Sign in</div>
    <div class="form-sub">Enter your credentials to access training plans</div>

    <div class="field">
      <label>Email address</label>
      <input type="email" placeholder="you@tigers.com.au" value="mark.t@tigers.com.au"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="Password" value="••••••••"/>
    </div>

    <button class="sign-in-btn">Sign in</button>

    <p class="form-note">Contact your administrator if you need access or have forgotten your password.</p>
  </div>

  <div class="role-strip">
    <div class="role-pill">
      <div class="role-pill-label">Admin access</div>
      <div class="role-pill-name">Create &amp; manage plans</div>
    </div>
    <div class="role-pill">
      <div class="role-pill-label">Coach access</div>
      <div class="role-pill-name">View your sessions</div>
    </div>
  </div>

</div>

</body>
</html>
